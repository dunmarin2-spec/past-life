<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕯️ 108 전생 업보 작두 판독기</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --spirit-red: #d63031; --spirit-gold: #f1c40f; --dark: #000000; }
        
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--dark); color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        .shrine-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: -1; }
        .shrine-bg::after { content: ''; position: absolute; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/dark-leather.png'); opacity: 0.3; }

        .shaman-card { 
            width: 90%; max-width: 450px; text-align: center; padding: 60px 20px; 
            border: 2px solid var(--spirit-red); border-radius: 5px; background: rgba(0,0,0,0.8);
            box-shadow: 0 0 50px rgba(214, 48, 49, 0.3); position: relative;
        }

        .shaman-img { font-size: 5rem; margin-bottom: 20px; display: block; filter: drop-shadow(0 0 10px var(--spirit-red)); animation: float 3s ease-in-out infinite; }
        .candles { display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 1.5rem; }
        .candle { animation: flicker 0.1s infinite; }

        h1 { font-size: 2rem; font-weight: 900; letter-spacing: -2px; color: var(--spirit-red); text-shadow: 0 0 15px rgba(214, 48, 49, 0.8); margin: 0; }
        .subtitle { color: #888; font-size: 0.9rem; margin-top: 10px; margin-bottom: 40px; }

        input { 
            width: 80%; padding: 15px; border: none; border-bottom: 2px solid var(--spirit-red); 
            background: transparent; color: #fff; font-size: 1.5rem; text-align: center; outline: none; 
            margin-bottom: 40px; font-weight: 700; transition: 0.3s;
        }
        input:focus { border-bottom-color: var(--spirit-gold); text-shadow: 0 0 10px var(--spirit-gold); }

        .btn-invoke { 
            background: var(--spirit-red); color: #fff; border: none; padding: 20px; width: 90%; 
            font-size: 1.4rem; font-weight: 900; cursor: pointer; transition: 0.2s;
            clip-path: polygon(10% 0, 90% 0, 100% 100%, 0% 100%);
        }
        .btn-invoke:hover { background: #b32d2d; transform: scale(1.05); }

        /* 결과창 오버레이 */
        #result-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; overflow-y: auto;
        }
        .amulet { 
            background: #fdf2f2; border: 5px double var(--spirit-red); padding: 30px 20px; 
            width: 90%; max-width: 400px; color: var(--spirit-red); box-shadow: 0 0 30px rgba(214, 48, 49, 0.5);
            position: relative; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .amulet-seal { position: absolute; top: 10px; right: 10px; border: 1px solid var(--spirit-red); padding: 3px; font-size: 0.7rem; font-weight: 900; opacity: 0.5; }
        
        .res-name { font-size: 1.1rem; margin-bottom: 10px; font-weight: 700; border-bottom: 1px solid var(--spirit-red); display: inline-block; color: #333; }
        .res-crime { font-size: 1.6rem; font-weight: 900; margin: 15px 0; line-height: 1.3; }
        .res-desc { font-size: 1rem; line-height: 1.6; text-align: left; background: rgba(255,255,255,0.7); padding: 15px; border-radius: 5px; font-weight: 600; color: #111; word-break: keep-all; }

        /* 🚀 쿠팡 바디워시 배너 스타일 */
        .coupang-banner {
            margin-top: 20px; width: 90%; max-width: 400px;
            background: #111; border: 2px solid var(--spirit-gold); border-radius: 10px;
            padding: 15px; text-decoration: none; display: block; transition: 0.2s;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.2);
        }
        .coupang-banner:active { transform: scale(0.98); }
        .cp-tag { color: var(--spirit-gold); font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; display: block; }
        .cp-title { color: #fff; font-size: 1rem; font-weight: 800; line-height: 1.4; }
        .cp-sub { color: #666; font-size: 0.65rem; margin-top: 10px; font-family: sans-serif; }

        @keyframes flicker { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.9; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="shrine-bg"></div>

    <div class="shaman-card">
        <div class="candles">
            <span class="candle">🕯️</span>
            <span class="candle" style="animation-delay: 0.05s;">🕯️</span>
            <span class="candle" style="animation-delay: 0.12s;">🕯️</span>
        </div>
        <span class="shaman-img">👹</span>
        <h1>108 업보 작두 판독</h1>
        <p class="subtitle">천지신명께 고하노니, 네 옹졸한 108번뇌를 밝히거라!</p>
        
        <input type="text" id="user-name" placeholder="성명을 입력하시오" maxlength="5">
        <br>
        <button class="btn-invoke" onclick="invokeSpirit()">방울 흔들기 (실시!)</button>
    </div>

    <div id="result-overlay">
        <div class="amulet">
            <div class="amulet-seal">108 KARMA</div>
            <div id="res-name" class="res-name"></div>
            <div id="res-crime" class="res-crime"></div>
            <div id="res-desc" class="res-desc"></div>
            <button style="margin-top: 25px; width: 100%; background: #000; color: #fff; border: none; padding: 12px; font-weight: 900; cursor: pointer; border-radius: 5px;" onclick="location.reload()">살풀이 완료 (물러가기)</button>
        </div>

        <a href="https://link.coupang.com/a/ea5Zs4" target="_blank" class="coupang-banner">
            <span class="cp-tag">✨ 전생의 업보까지 싹- 닦아내기</span>
            <div class="cp-title">죄는 미워하되 몸은 미워 말라!<br><span style="color:var(--spirit-gold)">천연 성분 바디워시</span>로 묵은 죄 정화 👉</div>
            <div class="cp-sub">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div>
        </a>
    </div>

    <script>
        const karmaList = [
            { title: "국밥 속 고기만 골라먹은 죄", desc: "주막에서 국밥을 시키고 남의 고기까지 훔쳐먹어 전우애를 박살냈구나! 현생에선 탕수육 시키면 소스가 늘 부족하리라." },
            { title: "옆집 고구마 서리하고 멧돼지 흉내낸 죄", desc: "서리하다 걸릴 뻔하자 꿀꿀거리며 도망쳐 주인장을 농락했군! 현생에선 짝사랑 앞에서 매번 딸꾹질이 터져 망신살이 뻗치리라." },
            { title: "과거 시험 날 옆사람 답안지 컨닝한 죄", desc: "공부 안 하고 남의 지식을 탐했구나! 현생에선 조별과제 할 때마다 무임승차 조원들 똥만 치우는 독박을 쓰게 되리라." },
            { title: "주막 계산할 때 신발 끈만 30분 묶은 죄", desc: "돈 낼 타이밍에 귀신같이 허리를 숙였군! 현생에선 단톡방에서 용기 내어 말할 때마다 '읽씹'만 당하게 되리라." },
            { title: "비 오는 날 진흙물 튀기고 웃은 죄", desc: "말 타고 지나가며 백성들 옷을 버려놓고 비웃었구나! 현생에선 큰맘 먹고 세차만 하면 다음 날 폭우가 쏟아지는 저주를 받으리라." },
            { title: "제사상 산자 몰래 훔쳐먹은 죄", desc: "조상님 드릴 제사 음식을 입에 먼저 털어넣었군! 현생에선 맛집 웨이팅 1시간 하고 내 차례에 재료가 소진되리라." },
            { title: "남의 집 빨랫줄 몰래 끊어놓은 죄", desc: "깨끗하게 빤 옷들을 흙바닥에 팽개치게 했구나! 현생에선 흰 셔츠 입은 날마다 짬뽕 국물이 튀리라." },
            { title: "말 엉덩이에 벌침 놓고 도망간 죄", desc: "점잖은 선비를 낙마시켜 엉덩방아 찧게 했군! 현생에선 조용한 도서관이나 회의실에서만 방귀가 마려우리라." },
            { title: "주막 주모에게 외상하고 야반도주한 죄", desc: "술은 퍼마시고 돈 한 푼 안 냈구나! 현생에선 적금 만기 때마다 기가 막히게 급전 나갈 일이 생겨 지갑이 비리라." },
            { title: "남의 집 장독대에 돌 던져 깨트린 죄", desc: "심술이 가득해 남의 씨간장 단지를 박살냈군! 현생에선 중고거래 할 때마다 진상 사기꾼만 만나리라." },
            { title: "왕의 행차 때 앞에서 방귀 뀌고 정색한 죄", desc: "엄숙한 분위기에 가스를 살포하고 남을 째려봤구나! 현생에선 중요한 미팅 때마다 바지 지퍼가 열려 있으리라." },
            { title: "나룻배 사공 몰래 노를 부러뜨린 죄", desc: "강 건너는 사람들 발을 묶어버렸군! 현생에선 지각 위기에 버스 정류장으로 뛰어가면 눈앞에서 문 닫고 출발하리라." },
            { title: "남의 집 대문에 소변보고 도망간 죄", desc: "가문의 얼굴에 먹칠을 했구나! 현생에선 화장실이 미친 듯이 급할 때마다 '점검 중' 팻말만 보리라." },
            { title: "과거 급제자 갓에 엿을 붙여놓은 죄", desc: "남의 경사를 끈적하게 방해했군! 현생에선 공들여 세팅한 머리가 바람 한 번에 산발이 되리라." },
            { title: "심부름 가서 돈 일부를 술값으로 탕진한 죄", desc: "주인의 믿음을 술잔에 녹였구나! 현생에선 월급날마다 귀신같이 과태료 고지서가 날아오리라." },
            { title: "밤마다 남의 집 담너머 엿본 죄", desc: "사생활을 탐닉한 관음의 업보로다! 현생에선 항상 알고 싶지 않은 남의 연애사 TMI만 들어 귀가 피곤해지리라." },
            { title: "길가던 선비 짚신 한 짝 훔친 죄", desc: "나그네를 절름발이로 만들었구나! 현생에선 마트 주차장 구석에 차를 대면 꼭 나갈 때 남의 차가 길을 막으리라." },
            { title: "서당 개에게 돌 던져 면학 분위기 흐린 죄", desc: "면학 분위기를 방해한 죄로다! 현생에선 집중 좀 하려 하면 윗집에서 인테리어 공사를 시작하리라." },
            { title: "이웃집 잔치 국수에 소금 한 주먹 넣은 죄", desc: "남의 잔칫상을 망쳐놓은 죄로다! 현생에선 배달 앱으로 주문할 때마다 주문 누락 서러움을 겪으리라." },
            { title: "남의 집 신발 속에 압정 숨겨둔 죄", desc: "걸음걸이마다 고통을 줬구나! 현생에선 새 신발 신는 날마다 뒤꿈치가 다 까져 절뚝거리리라." },
            { title: "우물물에 몰래 설사약 탄 죄", desc: "동네 사람들을 뒷간 귀신으로 만들었군! 현생에선 만원 지하철 장거리 이동 때마다 급똥 신호가 오리라." },
            { title: "잠자는 호랑이 수염 뽑으러 간 죄", desc: "객기로 사람들을 피곤하게 했구나! 현생에선 상사가 제일 빡쳐 있을 때만 골라 결재를 올리러 가게 되리라." },
            { title: "남의 집 소 꼬리에 방울 달아 도망가게 한 죄", desc: "농사지을 소를 놀라게 했군! 현생에선 알람을 5개 맞춰도 다 무의식에 끄고 지각하는 비극을 겪으리라." },
            { title: "옆집 애 돌잔치에 돌멩이 선물한 죄", desc: "남의 경사를 비웃은 대가로다! 현생에선 경품 추첨 때마다 딱 자기 앞 번호에서 1등이 당첨되리라." },

        function invokeSpirit() {
            const name = document.getElementById('user-name').value.trim();
            if(!name) { alert("성명을 대지 않으면 작두를 탈 수 없다!"); return; }

            let hash = 0;
            for (let i = 0; i < name.length; i++) { hash += name.charCodeAt(i); }
            
            const selected = karmaList[hash % karmaList.length];

            document.getElementById('res-name').innerText = name + "의 108 전생 업보";
            document.getElementById('res-crime').innerText = `"${selected.title}"`;
            document.getElementById('res-desc').innerText = selected.desc;
            
            document.getElementById('result-overlay').style.display = 'flex';
        }
