<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕯️ 108 전생 업보 판독기</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --spirit-red: #d63031; --bg: #ffffff; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); color: #2d3436; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .shaman-card { width: 90%; max-width: 450px; text-align: center; padding: 50px 20px; border: 3px solid #000; position: relative; box-shadow: 20px 20px 0px #eee; }
        .shaman-card::before { content: '🕯️'; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 2rem; background: white; padding: 0 10px; }

        h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 5px; }
        .subtitle { color: #636e72; font-size: 0.9rem; margin-bottom: 40px; }

        input { width: 80%; padding: 15px; border: none; border-bottom: 3px solid #000; font-size: 1.3rem; text-align: center; outline: none; margin-bottom: 30px; font-weight: 700; }
        
        button { background: #000; color: #fff; border: none; padding: 20px; width: 80%; font-size: 1.2rem; font-weight: 900; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--spirit-red); }

        /* 결과 화면 (부적 디자인) */
        #result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .amulet { border: 2px solid var(--spirit-red); padding: 30px; background: #fff1f1; max-width: 400px; position: relative; box-shadow: 10px 10px 30px rgba(0,0,0,0.1); }
        .amulet::before { content: '108 KARMA'; position: absolute; top: 5px; right: 10px; color: var(--spirit-red); font-size: 0.6rem; font-weight: 900; }
        
        .res-name { font-size: 1.1rem; margin-bottom: 10px; color: #555; }
        .res-crime { font-size: 1.8rem; font-weight: 900; color: var(--spirit-red); margin-bottom: 20px; line-height: 1.3; }
        .res-desc { font-size: 1.05rem; line-height: 1.7; text-align: left; border-top: 1px dashed var(--spirit-red); padding-top: 20px; word-break: keep-all; }

        .reset-btn { margin-top: 30px; width: 100%; background: #000; color: #fff; border: none; padding: 15px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="shaman-card">
        <h1>108 업보 작두 판독</h1>
        <p class="subtitle">이름 석 자에 서린 108번뇌의 죄명을 고하거라</p>
        <input type="text" id="user-name" placeholder="이름을 적으시오" maxlength="5">
        <br>
        <button onclick="invokeSpirit()">방울 흔들기 (결과 보기)</button>
    </div>

    <div id="result-overlay">
        <div class="amulet">
            <div id="res-name" class="res-name"></div>
            <div id="res-crime" class="res-crime"></div>
            <div id="res-desc" class="res-desc"></div>
            <button class="reset-btn" onclick="location.reload()">살풀이 완료 (물러가기)</button>
        </div>
    </div>

    <script>
        // 🚨 형님! 108개의 찰진 죄명 리스트입니다.
        const karmaList = [
            { title: "국밥 속 고기만 골라먹은 죄", desc: "주막에서 국밥을 시키고 남의 고기까지 훔쳐먹어 전우애를 박살냈구나! 현생에선 탕수육 소스가 늘 부족하리라." },
            { title: "옆집 고구마 서리하고 멧돼지 흉내낸 죄", desc: "서리하다 걸릴 뻔하자 꿀꿀거리며 도망쳐 주인장을 농락했군! 현생에선 매번 딸꾹질이 터져 망신살이 뻗치리라." },
            { title: "과거 시험 날 옆사람 답안지 컨닝한 죄", desc: "공부 안 하고 남의 지식을 탐했구나! 현생에선 평생 남이 싼 똥만 치우는 독박 업무를 맡게 되리라." },
            { title: "주막 계산할 때 신발 끈만 30분 묶은 죄", desc: "돈 낼 타이밍에 귀신같이 허리를 숙였군! 현생에선 모든 단톡방에서 '읽씹'만 당하게 되리라." },
            { title: "비 오는 날 진흙물 튀기고 웃은 죄", desc: "말 타고 지나가며 백성들 옷을 버려놓고 비웃었구나! 현생에선 세차만 하면 비가 쏟아지는 저주를 받으리라." },
            { title: "제사상 산자 몰래 훔쳐먹은 죄", desc: "조상님 드릴 음식을 입에 먼저 털어넣었군! 현생에선 맛집 갈 때마다 자기 앞에서 재료가 소진되리라." },
            { title: "남의 집 빨랫줄 몰래 끊어놓은 죄", desc: "깨끗한 옷들을 흙바닥에 팽개치게 했구나! 현생에선 흰 옷 입은 날마다 짬뽕 국물이 튀리라." },
            { title: "말 엉덩이에 벌침 놓고 도망간 죄", desc: "점잖은 선비를 낙마시켜 엉덩방아 찧게 했군! 현생에선 조용한 회의실에서만 배꼽시계가 울리리라." },
            { title: "주막 주모에게 외상하고 야반도주한 죄", desc: "술은 퍼마시고 돈은 안 냈구나! 현생에선 적금 만기 때마다 급전 나갈 일이 생겨 지갑이 비리라." },
            { title: "남의 집 장독대에 돌 던져 깨트린 죄", desc: "심술이 가득해 씨간장 단지를 박살냈군! 현생에선 택배 올 때마다 내용물이 파손되어 오리라." },
            { title: "왕의 행차 때 앞에서 방귀 뀌고 정색한 죄", desc: "엄숙한 분위기에 가스를 살포하고 남을 째려봤구나! 현생에선 짝사랑 앞에서만 생리현상이 터지리라." },
            { title: "나룻배 사공 몰래 노를 부러뜨린 죄", desc: "강 건너는 사람들 발을 묶었군! 현생에선 버스 타려 하면 눈앞에서 문 닫고 출발하리라." },
            { title: "남의 집 대문에 소변보고 도망간 죄", desc: "가문의 얼굴에 먹칠을 했구나! 현생에선 화장실 급할 때마다 '점검 중' 팻말만 보리라." },
            { title: "과거 급제자 갓에 엿을 붙여놓은 죄", desc: "남의 경사를 끈적하게 방해했군! 현생에선 중요한 발표 날마다 머리 모양이 망가지리라." },
            { title: "밤마다 남의 집 담너머 엿본 죄", desc: "사생활을 탐닉한 관음의 업보로다! 현생에선 항상 원치 않는 TMI만 들어 귀가 피곤해지리라." },
            { title: "길가던 선비 짚신 한 짝 훔친 죄", desc: "나그네를 절름발이로 만들었구나! 현생에선 주차장 구석에 차를 대면 꼭 나갈 때 차가 막히리라." },
            { title: "서당 개에게 돌 던져 면학 분위기 흐린 죄", desc: "공부 방해를 일삼은 죄로다! 현생에선 집중 좀 하려 하면 옆집에서 드릴 소리가 들리리라." },
            { title: "남의 제사 지방에 낙서한 죄", desc: "조상 신을 모욕했구나! 현생에선 중요한 이메일을 보낼 때마다 치명적인 오타를 내리라." },
            { title: "이웃집 잔치 국수에 소금 한 주먹 넣은 죄", desc: "남의 식탁을 망쳐놓은 죄로다! 현생에선 외식할 때마다 메뉴 주문이 누락되는 서러움을 겪으리라." },
            { title: "남의 신발 속에 압정 숨겨둔 죄", desc: "걸음걸이마다 고통을 줬구나! 현생에선 새 신발 신는 날마다 뒤꿈치가 다 까지리라." },
            { title: "우물물에 몰래 설사약 탄 죄", desc: "동네 사람들을 뒷간 귀신으로 만들었군! 현생에선 버스 장거리 이동 때마다 배가 아프리라." },
            { title: "옆집 소 꼬리에 방울 달아 도망가게 한 죄", desc: "농사지을 소를 놀라게 했군! 현생에선 스마트폰 알람이 안 울려 지각하는 비극을 겪으리라." },
            { title: "훈장님 주무실 때 얼굴에 안경 그린 죄", desc: "스승의 권위를 땅에 떨궜구나! 현생에선 진지한 대화 중에만 코딱지가 튀어나오리라." },
            { title: "나랏돈으로 자기 집 담장 세운 죄", desc: "공금 횡령의 무서운 죄로다! 현생에선 연말정산 때마다 돈을 뱉어내게 되리라." },
            { title: "남의 집 처마 밑에서 몰래 방뇨한 죄", desc: "남의 쉼터를 더럽혔구나! 현생에선 신발 신을 때마다 정체불명의 물기를 밟게 되리라." },
            { title: "선녀 나무꾼 옷 훔쳐다 시장에 판 죄", desc: "남의 로맨스를 돈으로 바꾼 죄로다! 현생에선 옷 살 때마다 사이즈 미스로 교환만 반복하리라." },
            { title: "마늘 먹고 곰인 척 호랑이 놀린 죄", desc: "기만질로 남의 멘탈을 흔들었군! 현생에선 항상 말귀를 못 알아듣는 동료만 만나리라." },
            { title: "남의 집 지붕 위에 고양이 똥 던진 죄", desc: "고상한 척하며 뒤로 구린 짓을 했구나! 현생에선 에어컨 켤 때마다 묘한 냄새가 나리라." },
            { title: "성문지기 졸 때 몰래 성문 잠근 죄", desc: "공공의 안전을 위협한 장난의 대가로다! 현생에선 집 도착 직전에 꼭 열쇠를 잃어버리리라." },
            { title: "남의 집 우체통에 바퀴벌레 넣은 죄", desc: "공포를 배달한 죄로다! 현생에선 택배 상자 뜯을 때마다 먼지만 잔뜩 마시리라." },
            { title: "엿장수 가위 소리에 춤만 추고 안 산 죄", desc: "남의 장사를 방해한 죄로다! 현생에선 장바구니에 담은 물건마다 품절되리라." },
            { title: "남의 집 빨래터에 먹물 한 바가지 부은 죄", desc: "청결을 모독한 죄로다! 현생에선 커피 마실 때마다 흰 셔츠에 꼭 튀리라." },
            { title: "암행어사 출두할 때 마패 숨긴 죄", desc: "공무 집행을 방해한 대죄로다! 현생에선 중요한 서류 제출 직전에 컴퓨터가 뻗으리라." },
            { title: "남의 집 굴뚝 연기 구멍 막아버린 죄", desc: "화목한 가정을 너구리굴로 만들었군! 현생에선 고기 구울 때마다 연기가 자기 쪽으로만 오리라." },
            { title: "길가에 바나나(껍질) 대신 뱀 가죽 던진 죄", desc: "지나가는 행인을 기절시킨 죄로다! 현생에선 이어폰 줄이 항상 미친 듯이 꼬여 있으리라." },
            { title: "남의 집 개 소리 흉내 내서 쌈 붙인 죄", desc: "이간질로 평화를 깬 업보로다! 현생에선 부모님 심부름 할 때마다 형제와 싸우게 되리라." },
            { title: "주막 계란말이 중간 부분만 쏙 빼먹은 죄", desc: "맛있는 부분만 취한 이기심의 극치로다! 현생에선 샌드위치를 사면 속 재료가 한쪽으로 쏠려 있으리라." },
            { title: "훈장님 훈장 몰래 훔쳐다 딱지 접은 죄", desc: "권위를 종이 쪼가리로 만든 죄로다! 현생에선 중고 거래 할 때마다 사기꾼만 만나리라." },

            { title: "남의 집 장독대에 몰래 고추장 훔친 죄", desc: "남의 살림을 거덜 낸 죄로다! 현생에선 배달 치킨에 무가 안 오는 슬픔을 겪으리라." },
            { title: "이웃집 닭 발목에 실 묶어 못 날게 한 죄", desc: "생명을 구속한 대죄로다! 현생에선 해외여행 갈 때마다 비행기가 지연되리라." },
            { title: "산신령 도끼 훔쳐다 나무 베는 데 쓴 죄", desc: "신의 물건을 남용한 죄로다! 현생에선 최신 폰 사자마자 액정을 박살 내리라." },
            { title: "주막에서 국밥 먹다 머리카락 나왔다고 뻥친 죄", desc: "공짜 밥을 노린 사기 죄로다! 현생에선 밥 먹을 때마다 진짜 머리카락이 나오리라." },
            { title: "남의 집 앞마당에 소똥 쏟아놓고 간 죄", desc: "남의 터를 더럽힌 죄로다! 현생에선 아침마다 신발 속에서 정체불명의 모래를 발견하리라." },
            { title: "남의 집 대문 앞에 '공사 중' 표지판 둔 죄", desc: "통행을 방해한 옹졸한 죄로다! 현생에선 출근길마다 도로 공사 때문에 차가 막히리라." },
            { title: "여우고개에서 여우 분장하고 사람들 놀래킨 죄", desc: "공포를 조장한 장난의 대가로다! 현생에선 밤마다 모기 한 마리가 귀옆에서 윙윙거리리라." },
            { title: "남의 집 처마에 매달린 곶감 다 따먹은 죄", desc: "겨울 양식을 훔친 파렴치한 죄로다! 현생에선 냉장고에 넣어둔 간식을 가족이 다 먹어버리리라." },
            { title: "주막에서 제일 비싼 술 시키고 도망간 죄", desc: "무전취식의 업보로다! 현생에선 카드 결제일마다 통장 잔고가 정확히 0원이 되리라." },
            { title: "남의 집 담벼락에 '여기는 화장실'이라고 쓴 죄", desc: "남의 집을 변소로 만든 대죄로다! 현생에선 주차장 빈자리 찾을 때마다 경차 전용만 보이리라." },

        function invokeSpirit() {
            const name = document.getElementById('user-name').value;
            if(!name) { alert("이름을 대지 않으면 작두를 탈 수 없다!"); return; }

            // 이름 글자 코드를 조합해 108개 중 하나를 고정적으로 선택
            let hash = 0;
            for (let i = 0; i < name.length; i++) { hash += name.charCodeAt(i); }
            const selected = karmaList[hash % karmaList.length];

            // 결과 화면 업데이트
            document.getElementById('res-name').innerText = name + "의 108 전생 업보";
            document.getElementById('res-crime').innerText = `"${selected.title}"`;
            document.getElementById('res-desc').innerText = selected.desc;
            document.getElementById('result-overlay').style.display = 'flex';
        }
